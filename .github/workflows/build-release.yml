name: Build Release

# ============================================
# Builds desktop + mobile + iOS quando uma tag v*.*.* é empurrada.
# Anexa todos os artefatos ao GitHub Release correspondente.
#
# Também pode rodar via workflow_dispatch para re-publicar uma tag.
#
# Secrets necessárias (graceful skip quando ausentes):
#   ANDROID_KEYSTORE_BASE64  — keystore .jks codificada em base64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#   APPLE_CERTIFICATE_BASE64 — .p12 codificado em base64
#   APPLE_CERTIFICATE_PASSWORD
#   APPLE_TEAM_ID
#   APPLE_PROVISIONING_PROFILE_BASE64
# ============================================

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (ex: v1.0.0)'
        required: true

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}

jobs:
  # ==========================================
  # Desktop: macOS ARM, macOS Intel, Linux, Windows
  # ==========================================
  desktop:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            os: macos-15
            target: aarch64-apple-darwin
            bundle_globs: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - name: macOS (Intel)
            os: macos-13
            target: x86_64-apple-darwin
            bundle_globs: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - name: Linux (x86_64)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_globs: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          - name: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_globs: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.platform.target }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.platform.bundle_globs }}
          fail_on_unmatched_files: false

  # ==========================================
  # Android (build unsigned se nao houver keystore; assinado quando ha)
  # ==========================================
  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Init Tauri Android project
        run: pnpm tauri android init --ci

      - name: Setup signing keystore (if secret present)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/app/release.keystore
          cat > src-tauri/gen/android/app/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build Android (release)
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: pnpm tauri android build --apk --aab

      - name: Rename Android artifacts
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          mkdir -p release-android
          find src-tauri/gen/android/app/build/outputs/apk/universal/release -name "*.apk" -exec cp {} "release-android/Promptys_${VER}_universal-android.apk" \;
          find src-tauri/gen/android/app/build/outputs/bundle/universalRelease -name "*.aab" -exec cp {} "release-android/Promptys_${VER}_universal-android.aab" \;
          ls -lh release-android/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release-android/*
          fail_on_unmatched_files: false

  # ==========================================
  # iOS — requer cert Apple e provisioning profile
  # Graceful skip quando secrets estao ausentes
  # ==========================================
  ios:
    name: iOS
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Apple secrets
        id: check
        run: |
          if [ -z "${APPLE_CERTIFICATE_BASE64}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing secrets ausentes — iOS build pulado. Configure APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD, APPLE_PROVISIONING_PROFILE_BASE64, APPLE_TEAM_ID para habilitar."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.check.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Rust toolchain
        if: steps.check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust
        if: steps.check.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        if: steps.check.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Import Apple certificate
        if: steps.check.outputs.skip != 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ env.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ env.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/promptys.mobileprovision

      - name: Init Tauri iOS project
        if: steps.check.outputs.skip != 'true'
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
        run: pnpm tauri ios init --ci

      - name: Build iOS (release IPA)
        if: steps.check.outputs.skip != 'true'
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
        run: pnpm tauri ios build --export-method app-store

      - name: Rename and stage iOS artifacts
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          mkdir -p release-ios
          find src-tauri/gen/apple/build -name "*.ipa" -exec cp {} "release-ios/Promptys_${VER}_ios.ipa" \;
          ls -lh release-ios/ || true

      - name: Upload to GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release-ios/*
          fail_on_unmatched_files: false
